<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbrella Customizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="container">
        <!-- Umbrella Preview Section -->
        <div class="preview-section">
            <div class="umbrella-wrapper">
                <div id="loader" class="loader hidden"></div>
                <img id="umbrella-image" src="assets/BlueUmbrella.png" alt="Customized Umbrella">
                <img id="logo-image" class="logo-overlay hidden" alt="Uploaded Logo">
            </div>
        </div>

        <!-- Customization Controls Section -->
        <div class="controls-section">
            <h1>Custom Umbrella</h1>
            <p class="subtitle">Customize your umbrella</p>
            
            <div id="color-swatches" class="color-swatches">
            
            </div>
            
            <p class="instruction-text">Upload a logo for an instant preview.</p>
            <p class="file-info">.png and .jpg files only. Max file size 5MB.</p>

            <div class="upload-area">
                <input type="file" id="logo-input" accept=".png, .jpg, .jpeg" class="hidden">
                <button id="upload-button" class="upload-button">
                </button>
            </div>
        </div>
    </div>

</body>
</html>
